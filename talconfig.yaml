---
clusterName: goldentooth
talosVersion: v1.12.5
kubernetesVersion: v1.34.0
endpoint: https://cp.k8s.goldentooth.net:6443
domain: cluster.local
allowSchedulingOnControlPlanes: false
additionalApiServerCertSans:
  - 10.4.0.9
  - 10.4.0.10
  - 10.4.0.11
  - 10.4.0.12
  - cp.k8s.goldentooth.net
clusterPodNets:
  - 10.244.0.0/16
clusterSvcNets:
  - 10.96.0.0/12
patches:
  - |-
    cluster:
      network:
        cni:
          name: none
      proxy:
        disabled: true
  - |-
    machine:
      registries:
        config:
          registry.goldentooth.net:
            tls:
              ca: 
nodes:
  - hostname: allyrion
    ipAddress: 10.4.0.10
    installDisk: /dev/mmcblk0
    controlPlane: true
    nodeLabels:
      slot: 'A'
      cpu.arch: armv8.0-a
    nodeAnnotations:
      slot: 'A'
  - hostname: bettley
    ipAddress: 10.4.0.11
