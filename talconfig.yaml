  - hostname: velaryon
    ipAddress: 10.4.0.30
    installDisk: /dev/nvme0n1
    controlPlane: false
    nodeLabels:
      role: 'gpu'
      slot: 'X'
      cpu.arch: x86-64
      nvidia.com/gpu.present: 'true'
    nodeAnnotations:
      role: 'gpu'
      slot: 'X'
    nodeTaints:
      gpu: "true:NoSchedule"
      platform: "x86:NoSchedule"
    overridePatches: true
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nonfree-kmod-nvidia-lts
            - siderolabs/nvidia-container-toolkit-lts
            - siderolabs/uinput
    patches:
      - |-
        machine:
          kernel:
            modules:
              - name: nvidia
              - name: nvidia_uvm
              - name: nvidia_drm
              - name: nvidia_modeset
              - name: uinput
          sysctls:
            net.core.bpf_jit_harden: 1
            user.max_user_namespaces: "100"
            vm.max_map_count: "524288"
          udev:
            rules:
              # Make input devices readable by all users (for Steam/gaming)
              - 'KERNEL=="event*", SUBSYSTEM=="input", MODE="0666"'
controlPlane:
  patches:
    - |-
      machine:
        network:
          interfaces:
            - interface: end0
              dhcp: true
              vip:
                ip: 10.4.0.9
worker:
  patches:
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/lib/longhorn
              type: bind
              source: /var/lib/longhorn
              options:
                - bind
                - rshared
                - rw
            - destination: /var/mnt/usb
              type: bind
              source: /var/mnt/usb
              options:
                - bind
                - rshared
                - rw
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools
